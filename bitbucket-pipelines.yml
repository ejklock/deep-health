image: node:24-slim

pipelines:
  tags:
    "*.*":
      - step:
          name: Test
          caches:
            - node
          script:
            - cd osv-security-cli
            - npm ci
            - npm run typecheck
            - npm run test:unit
            - npm run test:integration

      - step:
          name: Build
          caches:
            - node
          script:
            - cd osv-security-cli
            - npm ci
            - npm run build
          artifacts:
            - osv-security-cli/dist/**

      - step:
          # Node.js SEA does not support cross-compilation.
          # Bitbucket Cloud runs on Linux x86_64 only, so we build linux-x64 here.
          # Multi-platform builds (arm64, macOS, Windows, musl) are handled by
          # the GitHub Actions release workflow using native OS runners.
          name: Build Binaries
          image: node:24-slim
          script:
            - cd osv-security-cli
            - export TARGET_SUFFIX="linux-x64"
            - npm ci
            - npm run build:sea
            - sh scripts/build-sea.sh
          artifacts:
            - osv-security-cli/dist-bin/**

      - step:
          name: Publish Release
          script:
            - cd osv-security-cli
            - apt-get update -qq && apt-get install -y -qq curl
            - |
              for f in dist-bin/deep-health-*; do
                curl -s -u "${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}" \
                  -X POST "https://api.bitbucket.org/2.0/repositories/${BITBUCKET_REPO_FULL_NAME}/downloads" \
                  --form files=@"$f"
              done
