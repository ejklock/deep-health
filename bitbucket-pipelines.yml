image: node:24-slim

pipelines:
  tags:
    "*.*":
      - step:
          name: Test
          caches:
            - node
          script:
            - cd osv-security-cli
            - npm ci
            - npm run typecheck
            - npm run test:unit
            - npm run test:integration

      - step:
          name: Build
          caches:
            - node
          script:
            - cd osv-security-cli
            - npm ci
            - npm run build
          artifacts:
            - osv-security-cli/dist/**

      - step:
          name: Build Binaries
          image: oven/bun:latest
          script:
            - cd osv-security-cli
            - CLI_NAME=${CLI_NAME:-deep-health}
            - NPM_DEFAULT_FIXER=${NPM_DEFAULT_FIXER:-osv-then-audit}
            - bun install
            - bun build --compile --minify --external googleapis --external google-auth-library --target=bun-linux-x64 --define "process.env.CLI_NAME=\"$CLI_NAME\"" --define "process.env.NPM_DEFAULT_FIXER=\"$NPM_DEFAULT_FIXER\"" bin/deep-health.ts --outfile dist-bin/${CLI_NAME}-linux-x64
            - bun build --compile --minify --external googleapis --external google-auth-library --target=bun-linux-arm64 --define "process.env.CLI_NAME=\"$CLI_NAME\"" --define "process.env.NPM_DEFAULT_FIXER=\"$NPM_DEFAULT_FIXER\"" bin/deep-health.ts --outfile dist-bin/${CLI_NAME}-linux-arm64
            - bun build --compile --minify --external googleapis --external google-auth-library --target=bun-linux-x64-musl --define "process.env.CLI_NAME=\"$CLI_NAME\"" --define "process.env.NPM_DEFAULT_FIXER=\"$NPM_DEFAULT_FIXER\"" bin/deep-health.ts --outfile dist-bin/${CLI_NAME}-linux-x64-musl
            - bun build --compile --minify --external googleapis --external google-auth-library --target=bun-darwin-arm64 --define "process.env.CLI_NAME=\"$CLI_NAME\"" --define "process.env.NPM_DEFAULT_FIXER=\"$NPM_DEFAULT_FIXER\"" bin/deep-health.ts --outfile dist-bin/${CLI_NAME}-macos-arm64
            - bun build --compile --minify --external googleapis --external google-auth-library --target=bun-darwin-x64 --define "process.env.CLI_NAME=\"$CLI_NAME\"" --define "process.env.NPM_DEFAULT_FIXER=\"$NPM_DEFAULT_FIXER\"" bin/deep-health.ts --outfile dist-bin/${CLI_NAME}-macos-x64
            - bun build --compile --minify --external googleapis --external google-auth-library --target=bun-windows-x64 --define "process.env.CLI_NAME=\"$CLI_NAME\"" --define "process.env.NPM_DEFAULT_FIXER=\"$NPM_DEFAULT_FIXER\"" bin/deep-health.ts --outfile dist-bin/${CLI_NAME}-win-x64
          artifacts:
            - osv-security-cli/dist-bin/**

      - step:
          name: Publish Release
          script:
            - CLI_NAME=${CLI_NAME:-deep-health}
            - cd osv-security-cli
            - apt-get update -qq && apt-get install -y -qq curl
            - |
              for f in dist-bin/${CLI_NAME}-*; do
                curl -s -u "${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}" \
                  -X POST "https://api.bitbucket.org/2.0/repositories/${BITBUCKET_REPO_FULL_NAME}/downloads" \
                  --form files=@"$f"
              done
