name: Release

on:
  push:
    tags:
      - "*.*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Generate timestamp
        run: echo "TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Upload dist
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ env.TIMESTAMP }}
          path: dist/

  # -----------------------------------------------------------------------
  # PUBLISH — read-only, not active yet.
  # Uncomment and configure NPM_TOKEN secret before enabling.
  # -----------------------------------------------------------------------
  # publish:
  #   name: Publish to npm
  #   runs-on: ubuntu-latest
  #   needs: build
  #   permissions:
  #     contents: write   # needed to create GitHub Release
  #   steps:
  #     - uses: actions/checkout@v6
  #
  #     - uses: actions/setup-node@v6
  #       with:
  #         node-version: '26'
  #         registry-url: 'https://registry.npmjs.org'
  #         cache: 'npm'
  #         cache-dependency-path: package-lock.json
  #
  #     - name: Download dist
  #       uses: actions/download-artifact@v7
  #       with:
  #         name: dist
  #         path: dist/
  #
  #     - name: Install dependencies (prod only)
  #       run: npm ci --omit=dev
  #
  #     - name: Publish
  #       run: npm publish --access public
  #       env:
  #         NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  #
  #     - name: Create GitHub Release
  #       uses: softprops/action-gh-release@v3
  #       with:
  #         generate_release_notes: true

  # -----------------------------------------------------------------------
  # BUILD-BINARIES — Node.js SEA (Single Executable Application).
  # SEA does not support cross-compilation; each platform must build on its
  # own native runner. linux-x64-musl uses a separate job with Alpine container
  # (musl-linked node binary required for Alpine/Docker compatibility).
  #
  # vars.BRANDS: JSON array of brand objects. Example:
  # [{"cli_name":"deep-health","npm_default_fixer":"osv-then-audit"},{"cli_name":"security-scan","npm_default_fixer":"osv"}]
  # If not set, defaults to deep-health only.
  # -----------------------------------------------------------------------

  build-binaries:
    name: Build Binaries (${{ matrix.brand.cli_name }}, ${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        brand: ${{ fromJson(vars.BRANDS || '[{"cli_name":"deep-health","npm_default_fixer":"osv-then-audit"}]') }}
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: win-x64
    runs-on: ${{ matrix.os }}
    env:
      CLI_NAME: ${{ matrix.brand.cli_name }}
      NPM_DEFAULT_FIXER: ${{ matrix.brand.npm_default_fixer }}
      TARGET_SUFFIX: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SEA CJS bundle
        run: npm run build:sea
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Inject SEA blob (Unix)
        if: runner.os != 'Windows'
        run: sh scripts/build-sea.sh

      - name: Inject SEA blob (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sh scripts/build-sea.sh

      - name: Generate timestamp
        shell: bash
        run: echo "TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.brand.cli_name }}-${{ matrix.target }}-${{ env.TIMESTAMP }}
          path: dist-bin/

  build-binaries-musl:
    # linux-x64-musl requires a musl-linked node binary (Alpine).
    # Runs as a container job on ubuntu-latest.
    name: Build Binaries (${{ matrix.brand.cli_name }}, linux-x64-musl)
    needs: test
    runs-on: ubuntu-latest
    container:
      image: node:26-alpine
    strategy:
      fail-fast: false
      matrix:
        brand: ${{ fromJson(vars.BRANDS || '[{"cli_name":"deep-health","npm_default_fixer":"osv-then-audit"}]') }}
    env:
      CLI_NAME: ${{ matrix.brand.cli_name }}
      NPM_DEFAULT_FIXER: ${{ matrix.brand.npm_default_fixer }}
      TARGET_SUFFIX: linux-x64-musl
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apk add --no-cache python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Build SEA CJS bundle
        run: npm run build:sea
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Inject SEA blob
        run: sh scripts/build-sea.sh

      - name: Generate timestamp
        run: echo "TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.brand.cli_name }}-linux-x64-musl-${{ env.TIMESTAMP }}
          path: dist-bin/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, build-binaries, build-binaries-musl ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v7
        with:
          pattern: binaries-*
          merge-multiple: true
          path: binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: binaries/*
