  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile linux-x64
        run: bun build --compile --minify --bytecode --external googleapis --external
          google-auth-library --target=bun-linux-x64 bin/security-scan.ts
          --outfile dist-bin/security-scan-linux-x64

      - name: Compile linux-arm64
        run: bun build --compile --minify --bytecode --external googleapis --external
          google-auth-library --target=bun-linux-arm64 bin/security-scan.ts
          --outfile dist-bin/security-scan-linux-arm64

      - name: Compile linux-x64-musl
        run: bun build --compile --minify --bytecode --external googleapis --external
          google-auth-library --target=bun-linux-x64-musl bin/security-scan.ts
          --outfile dist-bin/security-scan-linux-x64-musl

      - name: Compile macos-arm64
        run: bun build --compile --minify --bytecode --external googleapis --external
          google-auth-library --target=bun-darwin-arm64 bin/security-scan.ts
          --outfile dist-bin/security-scan-macos-arm64

      - name: Compile macos-x64
        run: bun build --compile --minify --bytecode --external googleapis --external
          google-auth-library --target=bun-darwin-x64 bin/security-scan.ts
          --outfile dist-bin/security-scan-macos-x64

      - name: Compile win-x64
        run: bun build --compile --minify --bytecode --external googleapis --external
          google-auth-library --target=bun-windows-x64 bin/security-scan.ts
          --outfile dist-bin/security-scan-win-x64

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist-bin/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, build-binaries ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: binaries/*
