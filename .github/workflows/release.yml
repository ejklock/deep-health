name: Release

on:
  push:
    tags:
      - "*.*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -----------------------------------------------------------------------
  # PUBLISH — read-only, not active yet.
  # Uncomment and configure NPM_TOKEN secret before enabling.
  # -----------------------------------------------------------------------
  # publish:
  #   name: Publish to npm
  #   runs-on: ubuntu-latest
  #   needs: build
  #   permissions:
  #     contents: write   # needed to create GitHub Release
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: '24'
  #         registry-url: 'https://registry.npmjs.org'
  #         cache: 'npm'
  #         cache-dependency-path: package-lock.json
  #
  #     - name: Download dist
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: dist
  #         path: dist/
  #
  #     - name: Install dependencies (prod only)
  #       run: npm ci --omit=dev
  #
  #     - name: Publish
  #       run: npm publish --access public
  #       env:
  #         NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  #
  #     - name: Create GitHub Release
  #       uses: softprops/action-gh-release@v2
  #       with:
  #         generate_release_notes: true

  build-binaries:
    # vars.BRANDS: JSON array of brand objects. Example:
    # [{"cli_name":"deep-health","npm_default_fixer":"osv-then-audit"},{"cli_name":"security-scan","npm_default_fixer":"osv"}]
    # If not set, defaults to deep-health only.
    name: Build Binaries (${{ matrix.brand.cli_name }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        brand: ${{ fromJson(vars.BRANDS || '[{"cli_name":"deep-health","npm_default_fixer":"osv-then-audit"}]') }}
    env:
      CLI_NAME: ${{ matrix.brand.cli_name }}
      NPM_DEFAULT_FIXER: ${{ matrix.brand.npm_default_fixer }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile linux-x64
        run: bun build --compile --minify --bytecode --external googleapis --external google-auth-library --target=bun-linux-x64 --define 'process.env.CLI_NAME="${{ env.CLI_NAME }}"' --define 'process.env.NPM_DEFAULT_FIXER="${{ env.NPM_DEFAULT_FIXER }}"' bin/deep-health.ts --outfile dist-bin/${{ env.CLI_NAME }}-linux-x64

      - name: Compile linux-arm64
        run: bun build --compile --minify --bytecode --external googleapis --external google-auth-library --target=bun-linux-arm64 --define 'process.env.CLI_NAME="${{ env.CLI_NAME }}"' --define 'process.env.NPM_DEFAULT_FIXER="${{ env.NPM_DEFAULT_FIXER }}"' bin/deep-health.ts --outfile dist-bin/${{ env.CLI_NAME }}-linux-arm64

      - name: Compile linux-x64-musl
        run: bun build --compile --minify --bytecode --external googleapis --external google-auth-library --target=bun-linux-x64-musl --define 'process.env.CLI_NAME="${{ env.CLI_NAME }}"' --define 'process.env.NPM_DEFAULT_FIXER="${{ env.NPM_DEFAULT_FIXER }}"' bin/deep-health.ts --outfile dist-bin/${{ env.CLI_NAME }}-linux-x64-musl

      - name: Compile macos-arm64
        run: bun build --compile --minify --bytecode --external googleapis --external google-auth-library --target=bun-darwin-arm64 --define 'process.env.CLI_NAME="${{ env.CLI_NAME }}"' --define 'process.env.NPM_DEFAULT_FIXER="${{ env.NPM_DEFAULT_FIXER }}"' bin/deep-health.ts --outfile dist-bin/${{ env.CLI_NAME }}-macos-arm64

      - name: Compile macos-x64
        run: bun build --compile --minify --bytecode --external googleapis --external google-auth-library --target=bun-darwin-x64 --define 'process.env.CLI_NAME="${{ env.CLI_NAME }}"' --define 'process.env.NPM_DEFAULT_FIXER="${{ env.NPM_DEFAULT_FIXER }}"' bin/deep-health.ts --outfile dist-bin/${{ env.CLI_NAME }}-macos-x64

      - name: Compile win-x64
        run: bun build --compile --minify --bytecode --external googleapis --external google-auth-library --target=bun-windows-x64 --define 'process.env.CLI_NAME="${{ env.CLI_NAME }}"' --define 'process.env.NPM_DEFAULT_FIXER="${{ env.NPM_DEFAULT_FIXER }}"' bin/deep-health.ts --outfile dist-bin/${{ env.CLI_NAME }}-win-x64

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.brand.cli_name }}
          path: dist-bin/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, build-binaries ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: binaries/*
