name: Base CI

on:
    push:
        branches:
            - base
        tags:
            - "*.*"

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: osv-security-cli/package-lock.json

            - name: Install dependencies
              working-directory: osv-security-cli
              run: npm ci

            - name: Type check
              working-directory: osv-security-cli
              run: npm run typecheck

            - name: Unit tests
              working-directory: osv-security-cli
              run: npm run test:unit

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: osv-security-cli/package-lock.json

            - name: Install dependencies
              working-directory: osv-security-cli
              run: npm ci

            - name: Build
              working-directory: osv-security-cli
              run: npm run build

            - name: Upload dist
              uses: actions/upload-artifact@v4
              with:
                  name: security-scan
                  path: osv-security-cli/dist/
